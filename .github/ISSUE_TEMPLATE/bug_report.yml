name: Bug report
description: Report a reproducible problem
body:
  - type: input
    id: version
    attributes: { label: App version, placeholder: e.g. v0.1.0 }
    validations: { required: true }
  - type: textarea
    id: steps
    attributes: { label: Steps to Reproduce, placeholder: 1) ... 2) ... }
    validations: { required: true }
  - type: textarea
    id: logs
    attributes: { label: Relevant logs / screenshots }
